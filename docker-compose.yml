services:
  bot:
    container_name: maxbot-bot
    image: ghcr.io/vitikevich-landau/max-moderation-bot:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - path: ./default.env
        required: true
      - path: ./prod.env
        required: false
    volumes:
      - ./filters:/app/filters:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - maxbot

  db:
    image: postgres:18-alpine
    container_name: maxbot-db
    restart: unless-stopped
    env_file:
      - path: ./default.env
        required: true
      - path: ./prod.env
        required: false
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - maxbot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: maxbot-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly no
    volumes:
      - redis-data:/data
    networks:
      - maxbot
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  toxicity-api:
    profiles: ["toxicity"]
    build: ./toxicity-api
    container_name: maxbot-toxicity-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - maxbot

  toxicity-ui:
    profiles: ["toxicity"]
    build: ./toxicity-ui
    container_name: maxbot-toxicity-ui
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - API_URL=http://toxicity-api:8000
    depends_on:
      toxicity-api:
        condition: service_healthy
    networks:
      - maxbot

networks:
  maxbot:
    name: maxbot
    driver: bridge

volumes:
  pgdata:
    name: maxbot-pgdata
  redis-data:
    name: maxbot-redis-data
