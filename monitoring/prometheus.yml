global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "maxbot"
    static_configs:
      - targets: ["bot:9090"]

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]
